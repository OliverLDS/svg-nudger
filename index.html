<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Nudger v3.3</title>
  <style>
    :root {
      --sidebar-width: 320px;
      --border: #d8d8d8;
      --bg: #f6f6f6;
      --panel: #ffffff;
      --text: #222;
      --muted: #666;
      --accent: #e53935;
      --accent-soft: rgba(229, 57, 53, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 14px;
      overflow: auto;
    }

    main {
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(45deg, #eee 25%, transparent 25%),
        linear-gradient(-45deg, #eee 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eee 75%),
        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 10px;
    }

    h2 {
      font-size: 14px;
      margin: 18px 0 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    label {
      display: block;
      font-size: 13px;
      margin: 10px 0 4px;
      color: var(--muted);
    }

    input, select, button, textarea {
      width: 100%;
      font: inherit;
    }

    input, select, textarea {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin: 4px 0;
      background: #fff;
      cursor: pointer;
    }

    button:hover { background: #f0f0f0; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    textarea {
      min-height: 130px;
      resize: none;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .compact-row {
      display: grid;
      gap: 8px;
      align-items: end;
    }

    .compact-row.is-three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .compact-row.is-snap {
      grid-template-columns: 1.2fr 1fr 1fr;
    }

    .compact-row label {
      margin-top: 0;
    }

    .hint, .status, .info {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f4f4f4;
      color: #333;
    }

    #svgHost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 300px;
      min-height: 300px;
    }

    #svgHost svg {
      max-width: calc(100vw - var(--sidebar-width) - 60px);
      max-height: calc(100vh - 60px);
      background: white;
      border: 1px solid #bbb;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
      user-select: none;
      touch-action: none;
    }

    .empty {
      padding: 40px;
      border: 1px dashed #aaa;
      background: rgba(255, 255, 255, 0.82);
      color: #555;
      text-align: center;
      border-radius: 10px;
    }

    [data-nudger-selected-ui="true"] {
      outline: 2px dashed var(--accent);
      outline-offset: 2px;
      cursor: move;
    }

    .tiny-list {
      margin: 6px 0 0;
      padding-left: 16px;
    }

    .hidden {
      display: none;
    }

    .text-controls {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      width: min(320px, calc(100vw - var(--sidebar-width) - 40px));
      max-height: calc(100vh - 40px);
      overflow: auto;
      margin-top: 0;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(250, 250, 250, 0.98);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      z-index: 20;
    }

    .text-controls.is-visible {
      display: block;
    }

    .path-legend {
      display: none;
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 220px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
      z-index: 19;
      font-size: 12px;
      line-height: 1.4;
    }

    .path-legend.is-visible {
      display: block;
    }

    .path-legend strong {
      display: block;
      margin-bottom: 6px;
      color: #333;
    }

    .legend-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      background: #fff;
      flex: 0 0 auto;
    }

    .legend-swatch.is-endpoint {
      color: #0288d1;
      border-radius: 2px;
      background: #d7f0ff;
    }

    .legend-swatch.is-control {
      color: #fb8c00;
      border-radius: 999px;
      background: #fff7e6;
    }

    .legend-swatch.is-arc-axis {
      color: #8e24aa;
      transform: rotate(45deg);
      background: #f3e5f5;
    }

    .legend-swatch.is-center {
      color: #2e7d32;
      border-radius: 999px;
      background: #e8f6ed;
      position: relative;
    }

    .legend-swatch.is-center::before,
    .legend-swatch.is-center::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: currentColor;
      transform: translate(-50%, -50%);
    }

    .legend-swatch.is-center::before {
      width: 7px;
      height: 2px;
    }

    .legend-swatch.is-center::after {
      width: 2px;
      height: 7px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: #444;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .info-icon:hover {
      background: #f0f0f0;
    }

    .info-icon:focus-visible {
      outline: 2px solid #000;
      outline-offset: 2px;
    }

    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 6px 0 4px;
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      padding: 6px 10px;
      border: 1px solid #cfcfcf;
      border-radius: 999px;
      background: #f5f5f5;
      color: #555;
      font-size: 11px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
    }

    .mode-toggle:hover {
      background: #ededed;
    }

    .mode-toggle.is-code {
      border-color: #a66d00;
      background: #fff4d6;
      color: #7a4a00;
    }

    .mode-toggle.is-canvas {
      border-color: #2e6f43;
      background: #e8f6ed;
      color: #1f5c35;
    }

    .mode-toggle:focus-visible {
      outline: 2px solid #000;
      outline-offset: 2px;
    }

    .help-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
    }

    .help-modal.is-open {
      display: flex;
    }

    .help-dialog {
      width: min(520px, 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      padding: 16px;
    }

    .help-dialog h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .help-dialog pre {
      margin: 0;
      white-space: pre-wrap;
      font: inherit;
      line-height: 1.5;
      color: var(--text);
    }

    .help-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .help-close {
      width: auto;
      min-width: 84px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .panel-close {
      width: auto;
      min-width: 30px;
      height: 30px;
      padding: 0;
      border-radius: 999px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .mini-icon {
      width: 24px;
      min-width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .code-panel {
      display: none;
      position: fixed;
      top: 24px;
      left: 24px;
      width: min(760px, calc(100vw - 48px));
      height: min(320px, calc(100vh - 48px));
      min-width: 360px;
      min-height: 180px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      resize: both;
      z-index: 25;
    }

    .code-panel.is-visible {
      display: flex;
      flex-direction: column;
    }

    .code-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(246, 246, 246, 0.95);
      cursor: move;
      user-select: none;
    }

    .code-panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 13px;
      font-weight: 600;
    }

    .code-panel-body {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      padding: 10px 12px 12px;
    }

    .code-panel-body textarea {
      height: 100%;
      min-height: 0;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #f2f2f2;
      padding: 1px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <aside>
    <div class="section-title">
      <h1>SVG Nudger v3.3</h1>
      <button id="toolHelpBtn" class="info-icon" type="button" aria-label="Tool help">i</button>
    </div>

    <h2>Load SVG</h2>
    <input type="file" id="fileInput" accept=".svg,image/svg+xml" />

    <h2 class="section-title">
      <span>SVG Document</span>
      <button id="svgDocHelpBtn" class="info-icon" type="button" aria-label="SVG document help">i</button>
    </h2>
    <div class="compact-row is-three">
      <div>
        <label for="svgWidthInput">Width</label>
        <input id="svgWidthInput" type="text" placeholder="800" readonly />
      </div>
      <div>
        <label for="svgHeightInput">Height</label>
        <input id="svgHeightInput" type="text" placeholder="600" readonly />
      </div>
      <div>
        <label for="fitPaddingInput">Fit Padding</label>
        <input id="fitPaddingInput" type="text" placeholder="0" value="0" />
      </div>
    </div>
    <button id="fitSvgToContentBtn" disabled>Fit SVG To Content</button>

    <h2>Move / Resize Controls</h2>
    <div class="compact-row is-snap">
      <div>
        <label for="snapSelect">Grid snapping</label>
        <select id="snapSelect">
          <option value="0">Off</option>
          <option value="1" selected>1 px</option>
          <option value="5">5 px</option>
          <option value="10">10 px</option>
          <option value="20">20 px</option>
        </select>
      </div>
      <button id="undoBtn" disabled>Undo</button>
      <button id="redoBtn" disabled>Redo</button>
    </div>

    <h2 class="section-title">
      <span>Selection</span>
      <button id="pathHandlesToggle" class="mode-toggle is-canvas" type="button" aria-pressed="true">Path handles on</button>
    </h2>
    <div id="selectedInfo" class="info">No element selected.</div>

    <h2 class="section-title">
      <span>Export</span>
      <button id="showCodePanelBtn" class="mini-icon" type="button" aria-label="Show current SVG code panel">+</button>
    </h2>
    <button id="copyBtn" disabled>Copy SVG Code</button>
    <button id="downloadBtn" disabled>Download Edited SVG</button>

    <div id="status" class="status">No SVG loaded.</div>
  </aside>

  <main>
    <div id="svgHost">
      <div class="empty">Open an SVG file to begin.</div>
    </div>

    <div id="codePanel" class="code-panel">
      <div id="codePanelHeader" class="code-panel-header">
        <div class="code-panel-title">
          <span>Current SVG code</span>
        </div>
        <div class="panel-title">
          <button id="codeModeToggle" class="mode-toggle is-canvas" type="button" aria-pressed="false">Canvas mode</button>
          <button id="hideCodePanelBtn" class="mini-icon" type="button" aria-label="Hide current SVG code panel">-</button>
        </div>
      </div>
      <div class="code-panel-body">
        <textarea id="svgCode" wrap="off" spellcheck="false" placeholder="SVG code will appear here after loading. Edit here, then blur or press Ctrl/Cmd+Enter to apply."></textarea>
      </div>
    </div>

    <div id="textControls" class="text-controls hidden">
      <div class="panel-header">
        <div class="panel-title">
          <strong>Text style</strong>
          <button id="textHelpBtn" class="info-icon" type="button" aria-label="Text style help">i</button>
        </div>
        <button id="textCloseBtn" class="panel-close" type="button" aria-label="Close text style panel">×</button>
      </div>
      <label for="fontFamilyInput">Font family</label>
      <input id="fontFamilyInput" type="text" placeholder="Arial, Helvetica, sans-serif" />

      <label for="fontSizeInput">Font size</label>
      <input id="fontSizeInput" type="text" placeholder="16px, 1.2em, 24" />

      <button id="applyTextBtn">Apply Text Style</button>
    </div>

    <div id="pathLegend" class="path-legend" aria-hidden="true">
      <strong>Path Edit Handles</strong>
      <ul class="legend-list">
        <li class="legend-item"><span class="legend-swatch is-endpoint"></span><span>Endpoint</span></li>
        <li class="legend-item"><span class="legend-swatch is-control"></span><span>Curve control</span></li>
        <li class="legend-item"><span class="legend-swatch is-arc-axis"></span><span>Arc radius / rotation</span></li>
        <li class="legend-item"><span class="legend-swatch is-center"></span><span>Arc center move</span></li>
      </ul>
    </div>
  </main>

  <div id="helpModal" class="help-modal" aria-hidden="true">
    <div class="help-dialog" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <h3 id="helpTitle"></h3>
      <pre id="helpBody"></pre>
      <div class="help-actions">
        <button id="helpCloseBtn" class="help-close" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    const NS = "http://www.w3.org/2000/svg";

    const fileInput = document.getElementById("fileInput");
    const svgHost = document.getElementById("svgHost");
    const statusEl = document.getElementById("status");
    const selectedInfo = document.getElementById("selectedInfo");
    const pathHandlesToggle = document.getElementById("pathHandlesToggle");
    const snapSelect = document.getElementById("snapSelect");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const svgDocHelpBtn = document.getElementById("svgDocHelpBtn");
    const svgWidthInput = document.getElementById("svgWidthInput");
    const svgHeightInput = document.getElementById("svgHeightInput");
    const fitPaddingInput = document.getElementById("fitPaddingInput");
    const fitSvgToContentBtn = document.getElementById("fitSvgToContentBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const codePanel = document.getElementById("codePanel");
    const codePanelHeader = document.getElementById("codePanelHeader");
    const svgCode = document.getElementById("svgCode");
    const codeModeToggle = document.getElementById("codeModeToggle");
    const showCodePanelBtn = document.getElementById("showCodePanelBtn");
    const hideCodePanelBtn = document.getElementById("hideCodePanelBtn");
    const toolHelpBtn = document.getElementById("toolHelpBtn");
    const textHelpBtn = document.getElementById("textHelpBtn");
    const textCloseBtn = document.getElementById("textCloseBtn");
    const helpModal = document.getElementById("helpModal");
    const helpTitle = document.getElementById("helpTitle");
    const helpBody = document.getElementById("helpBody");
    const helpCloseBtn = document.getElementById("helpCloseBtn");
    const textControls = document.getElementById("textControls");
    const pathLegend = document.getElementById("pathLegend");
    const fontFamilyInput = document.getElementById("fontFamilyInput");
    const fontSizeInput = document.getElementById("fontSizeInput");
    const applyTextBtn = document.getElementById("applyTextBtn");

    let svg = null;
    let overlay = null;
    let selectedElements = new Set();
    let fileName = "edited.svg";
    let activeAction = null;
    let activeCodePanelDrag = null;
    let codePanelHidden = false;
    let codeEditorDirty = false;
    let interactionMode = "canvas";
    let lastFocusedBeforeHelp = null;
    let pathHandlesVisible = true;
    let textPanelDismissed = false;

    const undoStack = [];
    const redoStack = [];

    const toolHelpText = [
      "Click to select one object.",
      "Shift + click to add/remove objects.",
      "Drag a selected object to move the whole selection.",
      "Drag the box handles to resize.",
      "Single-select a <path> to reveal draggable end points, curve controls, and arc handles.",
      "Hold Shift while resizing from a corner to preserve proportion.",
      "Use arrow keys for fine movement.",
      "Option/Alt-click a <tspan> to select that exact line instead of its parent <text>.",
      "Single-select an object to auto-locate its SVG code."
    ].join("\n");

    const textHelpText = "Works on selected <text> and <tspan> elements. Multiple selected text elements are updated together. Plain clicks on nested <tspan> lines target the parent <text>; use Option/Alt-click to target one exact <tspan>.";
    const svgDocumentHelpText = [
      "This workflow assumes you are not using tools such as rsvg or Inkscape for conversion.",
      "",
      "Fit SVG To Content rewrites the SVG file's viewBox, width, and height to the visible content bounds plus the padding value.",
      "",
      "For PDF export, one practical workflow is:",
      "1. Open the SVG in Safari.",
      "2. Print to PDF.",
      "3. Use a custom paper size matching the Width and Height values shown here in px.",
      "4. Adjust print scale as needed.",
      "",
      "The 340% scale value you found can work in practice, but it is not a universal ratio. Safari print scaling is workflow-specific, so treat 340% as a starting point, not a guaranteed rule."
    ].join("\n");

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const text = await file.text();
      fileName = file.name.replace(/\.svg$/i, "") + "-edited.svg";
      loadSvg(text);
    });

    function loadSvg(text) {
      const parsed = parseSvgMarkup(text);
      if (!parsed.ok) {
        clearLoadedSvgState();
        svgHost.replaceChildren(createEmptyMessage("Invalid SVG file."));
        setExportEnabled(false);
        updateDocumentSizeControls();
        updateSelectionUI();
        updateHistoryButtons();
        updateSvgCode({ force: true });
        setInteractionMode("canvas", { syncFocus: false });
        setStatus(parsed.error);
        return;
      }

      mountSvg(parsed.svg);
    }

    function parseSvgMarkup(text) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "image/svg+xml");
      const parserError = doc.querySelector("parsererror");

      if (parserError) {
        return {
          ok: false,
          error: parserError.textContent ? parserError.textContent.trim() : "Invalid SVG markup."
        };
      }

      const svgElement = doc.documentElement;
      if (!svgElement || svgElement.tagName.toLowerCase() !== "svg") {
        return {
          ok: false,
          error: "The content does not contain an <svg> root element."
        };
      }

      return {
        ok: true,
        svg: document.importNode(svgElement, true)
      };
    }

    function createEmptyMessage(message) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = message;
      return empty;
    }

    function intrinsicSvgSize(svgElement) {
      const viewBox = svgElement.viewBox && svgElement.viewBox.baseVal
        ? svgElement.viewBox.baseVal
        : null;
      const widthAttr = parseSvgLength(svgElement.getAttribute("width"));
      const heightAttr = parseSvgLength(svgElement.getAttribute("height"));

      if (widthAttr && heightAttr) {
        return { width: widthAttr, height: heightAttr };
      }
      if (viewBox && viewBox.width > 0 && viewBox.height > 0) {
        return { width: viewBox.width, height: viewBox.height };
      }

      return { width: 800, height: 600 };
    }

    function parseSvgLength(value) {
      if (!value) return 0;
      const match = String(value).match(/[-+]?(?:\d*\.\d+|\d+)/);
      if (!match) return 0;
      const parsed = Number.parseFloat(match[0]);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function clearLoadedSvgState(options = {}) {
      svg = null;
      overlay = null;
      activeAction = null;
      selectedElements.forEach(el => el.removeAttribute("data-nudger-selected-ui"));
      selectedElements.clear();
      undoStack.length = 0;
      redoStack.length = 0;
      codeEditorDirty = false;
      textPanelDismissed = false;
      updateDocumentSizeControls();
      if (!options.preserveMode) {
        setInteractionMode("canvas", { syncFocus: false });
      }
    }

    function mountSvg(svgElement) {
      clearLoadedSvgState({ preserveMode: true });
      svgHost.replaceChildren(svgElement);
      svg = svgElement;

      ensureOverlay();

      svg.addEventListener("pointerdown", onPointerDown);
      svg.addEventListener("pointermove", onPointerMove);
      svg.addEventListener("pointerup", onPointerUp);
      svg.addEventListener("pointercancel", onPointerUp);
      svg.addEventListener("pointerleave", onPointerUp);

      setExportEnabled(true);
      updateDocumentSizeControls();
      updateSelectionUI();
      updateHistoryButtons();
      updateSvgCode({ force: true });
      updatePathHandlesToggle();
      setInteractionMode(interactionMode === "code" ? "code" : "canvas", { syncFocus: false });

        if (event.shiftKey) redo();
        else undo();
        event.preventDefault();
        return;
      }

      if (interactionMode === "code") return;
      if (document.activeElement === svgCode) return;

      if (!svg || selectedElements.size === 0) return;

      const snap = getSnap() || 1;
      const multiplier = event.shiftKey ? 10 : 1;
      const step = snap * multiplier;

      let dx = 0;
      let dy = 0;

      if (event.key === "ArrowLeft") dx = -step;
      if (event.key === "ArrowRight") dx = step;
      if (event.key === "ArrowUp") dy = -step;
      if (event.key === "ArrowDown") dy = step;

      if (dx !== 0 || dy !== 0) {
        const entries = captureSelectionStart();
        const matrix = translationMatrix(dx, dy);
        entries.forEach(entry => applyRootMatrixFromStart(entry, matrix));
        commitHistory(entries);
        updateSelectionUI();
        updateSvgCode();
        event.preventDefault();
      }
    });

    function undo() {
      const entry = undoStack.pop();
      if (!entry) return;
      entry.items.forEach(item => restoreHistoryItem(item, "before"));
      redoStack.push(entry);
      selectFromHistory(entry.items);
      updateHistoryButtons();
      updateSelectionUI();
      updateSvgCode({ locateSelection: selectedElements.size === 1 });
      setStatus("Undo applied.");
    }

    function redo() {
      const entry = redoStack.pop();
      if (!entry) return;
      entry.items.forEach(item => restoreHistoryItem(item, "after"));
      undoStack.push(entry);
      selectFromHistory(entry.items);
      updateHistoryButtons();
      updateSelectionUI();
      updateSvgCode({ locateSelection: selectedElements.size === 1 });
      setStatus("Redo applied.");
    }

    function restoreHistoryItem(item, key) {
      if (item.attr) {
        restoreAttribute(item.element, item.attr, item[key]);
      } else {
        restoreTransform(item.element, item[key]);
      }
    }

    function restoreTransform(element, value) {
      if (value) element.setAttribute("transform", value);
      else element.removeAttribute("transform");
    }

    function restoreAttribute(element, attr, value) {
      if (value) element.setAttribute(attr, value);
      else element.removeAttribute(attr);
    }

    function updateHistoryButtons() {
      undoBtn.disabled = undoStack.length === 0;
      redoBtn.disabled = redoStack.length === 0;
    }

    undoBtn.addEventListener("click", undo);
    redoBtn.addEventListener("click", redo);

    function ensureOverlay() {
      if (!svg) return;
      overlay = document.createElementNS(NS, "g");
      overlay.setAttribute("data-nudger-overlay", "true");
      overlay.setAttribute("pointer-events", "none");
      svg.appendChild(overlay);
    }

    function selectionBBox() {
      if (!svg || selectedElements.size === 0) return null;

      const points = [];
      selectedElements.forEach(el => {
        try {
          const box = el.getBBox();
          const matrix = el.getCTM();
          if (!matrix) return;
          const corners = [
            [box.x, box.y],
            [box.x + box.width, box.y],
            [box.x + box.width, box.y + box.height],
            [box.x, box.y + box.height]
          ];
          corners.forEach(([x, y]) => {
            const point = svg.createSVGPoint();
            point.x = x;
            point.y = y;
            points.push(point.matrixTransform(matrix));
          });
        } catch (error) {
          // Some SVG nodes may not expose a usable bbox. Skip them.
        }
      });

      if (points.length === 0) return null;

      const xs = points.map(p => p.x);
      const ys = points.map(p => p.y);
      const minX = Math.min(...xs);
      const minY = Math.min(...ys);
      const maxX = Math.max(...xs);
      const maxY = Math.max(...ys);

      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    function selectedSingleEditablePath() {
      if (selectedElements.size !== 1) return null;
      const element = Array.from(selectedElements)[0];
      if (!element || (element.tagName || "").toLowerCase() !== "path") return null;

      const segments = parsePathData(element.getAttribute("d") || "");
      if (!segments) return null;
      return segments.some(segment => ["L", "C", "Q", "A"].includes(segment.type)) ? element : null;
    }

    function updateOverlay() {
      if (!overlay) return;
      overlay.innerHTML = "";

      const box = selectionBBox();
      if (!box) return;

      const rect = document.createElementNS(NS, "rect");
      rect.setAttribute("x", box.x);
      rect.setAttribute("y", box.y);
      rect.setAttribute("width", box.width);
      rect.setAttribute("height", box.height);
      rect.setAttribute("fill", "rgba(229,57,53,0.06)");
      rect.setAttribute("stroke", "#e53935");
      rect.setAttribute("stroke-width", "1.5");
      rect.setAttribute("stroke-dasharray", "5 4");
      rect.setAttribute("vector-effect", "non-scaling-stroke");
      rect.setAttribute("pointer-events", "none");
      overlay.appendChild(rect);

      const positions = {
        nw: [box.x, box.y],
        n: [box.x + box.width / 2, box.y],
        ne: [box.x + box.width, box.y],
        e: [box.x + box.width, box.y + box.height / 2],
        se: [box.x + box.width, box.y + box.height],
        s: [box.x + box.width / 2, box.y + box.height],
        sw: [box.x, box.y + box.height],
        w: [box.x, box.y + box.height / 2]
      };

      Object.entries(positions).forEach(([name, [x, y]]) => {
        const handle = document.createElementNS(NS, "rect");
        handle.setAttribute("x", x - 4);
        handle.setAttribute("y", y - 4);
        handle.setAttribute("width", 8);
        handle.setAttribute("height", 8);
        handle.setAttribute("rx", 1.5);
        handle.setAttribute("fill", "#ffffff");
        handle.setAttribute("stroke", "#e53935");
        handle.setAttribute("stroke-width", "1.5");
        handle.setAttribute("vector-effect", "non-scaling-stroke");
        handle.setAttribute("data-nudger-handle", name);
        handle.setAttribute("pointer-events", "all");
        handle.style.cursor = cursorForHandle(name);
        overlay.appendChild(handle);
      });

      const editablePath = pathHandlesVisible ? selectedSingleEditablePath() : null;
      if (editablePath) {
        appendPathCurveOverlay(editablePath);
      }
    }

    function appendPathCurveOverlay(pathEl) {
      const segments = parsePathData(pathEl.getAttribute("d") || "");
      const ctm = pathEl.getCTM();
      if (!segments || !ctm) return;

      let currentX = 0;
      let currentY = 0;

      segments.forEach((segment, index) => {
        if (segment.type === "M") {
          const start = screenPointFromLocal(ctm, segment.x, segment.y);
          appendOverlayPointHandle(index, "x", "y", start, "#d7f0ff", "#0288d1");
          currentX = segment.x;
          currentY = segment.y;
          return;
        }

        if (segment.type === "C") {
          const start = screenPointFromLocal(ctm, currentX, currentY);
          const control1 = screenPointFromLocal(ctm, segment.x1, segment.y1);
          const control2 = screenPointFromLocal(ctm, segment.x2, segment.y2);
          const end = screenPointFromLocal(ctm, segment.x, segment.y);

          appendOverlayGuideLine(start, control1);
          appendOverlayGuideLine(end, control2);
          appendOverlayPointHandle(index, "x1", "y1", control1, "#ffffff", "#fb8c00");
          appendOverlayPointHandle(index, "x2", "y2", control2, "#ffffff", "#fb8c00");
          appendOverlayPointHandle(index, "x", "y", end, "#d7f0ff", "#0288d1");

          currentX = segment.x;
          currentY = segment.y;
          return;
        }

        if (segment.type === "Q") {
          const start = screenPointFromLocal(ctm, currentX, currentY);
          const control = screenPointFromLocal(ctm, segment.x1, segment.y1);
          const end = screenPointFromLocal(ctm, segment.x, segment.y);

          appendOverlayGuideLine(start, control);
          appendOverlayGuideLine(control, end);
          appendOverlayPointHandle(index, "x1", "y1", control, "#fff7e6", "#fb8c00");
          appendOverlayPointHandle(index, "x", "y", end, "#d7f0ff", "#0288d1");

          currentX = segment.x;
          currentY = segment.y;
          return;
        }

        if (segment.type === "A") {
          const end = screenPointFromLocal(ctm, segment.x, segment.y);
          const geometry = arcGeometryFromSegment(currentX, currentY, segment);
          appendOverlayPointHandle(index, "x", "y", end, "#d7f0ff", "#0288d1");

          if (geometry) {
            const center = screenPointFromLocal(ctm, geometry.cx, geometry.cy);
            const rxOffset = rotateOffset(geometry.rx, 0, geometry.rotation);
            const ryOffset = rotateOffset(0, geometry.ry, geometry.rotation);
            const rxHandle = screenPointFromLocal(ctm, geometry.cx + rxOffset.x, geometry.cy + rxOffset.y);
            const ryHandle = screenPointFromLocal(ctm, geometry.cx + ryOffset.x, geometry.cy + ryOffset.y);

            appendOverlayGuideLine(center, rxHandle);
            appendOverlayGuideLine(center, ryHandle);
            appendOverlayPointHandle(index, null, null, rxHandle, "#f3e5f5", "#8e24aa", "arc-rx", { shape: "diamond" });
            appendOverlayPointHandle(index, null, null, ryHandle, "#fce4ec", "#d81b60", "arc-ry", { shape: "diamond" });
            appendOverlayPointHandle(index, null, null, center, "#e8f6ed", "#2e7d32", "arc-center", { shape: "cross-circle", radius: 6 });
          }

          currentX = segment.x;
          currentY = segment.y;
          return;
        }

        if (segment.type === "L") {
          const end = screenPointFromLocal(ctm, segment.x, segment.y);
          appendOverlayPointHandle(index, "x", "y", end, "#d7f0ff", "#0288d1");
          currentX = segment.x;
          currentY = segment.y;
        }
      });
    }

    function appendOverlayGuideLine(a, b) {
      const line = document.createElementNS(NS, "line");
      line.setAttribute("x1", a.x);
      line.setAttribute("y1", a.y);
      line.setAttribute("x2", b.x);
      line.setAttribute("y2", b.y);
      line.setAttribute("stroke", "#fb8c00");
      line.setAttribute("stroke-width", "1.25");
      line.setAttribute("stroke-dasharray", "3 3");
      line.setAttribute("vector-effect", "non-scaling-stroke");
      line.setAttribute("pointer-events", "none");
      overlay.appendChild(line);
    }

    function appendOverlayPointHandle(segmentIndex, keyX, keyY, point, fill, stroke, kind = "point", options = {}) {
      const radius = options.radius || 5;
      const shape = options.shape || "circle";
      const group = document.createElementNS(NS, "g");
      group.setAttribute("data-nudger-path-handle", "true");
      group.setAttribute("data-segment-index", String(segmentIndex));
      group.setAttribute("data-handle-kind", kind);
      if (keyX) group.setAttribute("data-point-key-x", keyX);
      if (keyY) group.setAttribute("data-point-key-y", keyY);
      group.setAttribute("pointer-events", "all");
      group.style.cursor = kind === "point" ? "grab" : kind === "arc-center" ? "move" : "grab";

      const target = document.createElementNS(NS, shape === "diamond" ? "rect" : "circle");
      if (shape === "diamond") {
        target.setAttribute("x", point.x - radius);
        target.setAttribute("y", point.y - radius);
        target.setAttribute("width", radius * 2);
        target.setAttribute("height", radius * 2);
        target.setAttribute("transform", `rotate(45 ${point.x} ${point.y})`);
      } else {
        target.setAttribute("cx", point.x);
        target.setAttribute("cy", point.y);
        target.setAttribute("r", radius);
      }
      target.setAttribute("fill", fill);
      target.setAttribute("stroke", stroke);
      target.setAttribute("stroke-width", "1.8");
      target.setAttribute("vector-effect", "non-scaling-stroke");
      group.appendChild(target);

      if (shape === "cross-circle") {
        const h = document.createElementNS(NS, "line");
        h.setAttribute("x1", point.x - 3);
        h.setAttribute("y1", point.y);
        h.setAttribute("x2", point.x + 3);
        h.setAttribute("y2", point.y);
        h.setAttribute("stroke", stroke);
        h.setAttribute("stroke-width", "1.8");
        h.setAttribute("vector-effect", "non-scaling-stroke");
        h.setAttribute("pointer-events", "none");
        group.appendChild(h);

        const v = document.createElementNS(NS, "line");
        v.setAttribute("x1", point.x);
        v.setAttribute("y1", point.y - 3);
        v.setAttribute("x2", point.x);
        v.setAttribute("y2", point.y + 3);
        v.setAttribute("stroke", stroke);
        v.setAttribute("stroke-width", "1.8");
        v.setAttribute("vector-effect", "non-scaling-stroke");
        v.setAttribute("pointer-events", "none");
        group.appendChild(v);
      }

      overlay.appendChild(group);
    }

    function rotateOffset(x, y, rotationDegrees) {
      const radians = rotationDegrees * Math.PI / 180;
      const cos = Math.cos(radians);
      const sin = Math.sin(radians);
      return {
        x: x * cos - y * sin,
        y: x * sin + y * cos
      };
    }

    function segmentStartPoint(segments, segmentIndex) {
      let currentX = 0;
      let currentY = 0;
      let startX = 0;
      let startY = 0;

      for (let i = 0; i < segments.length; i += 1) {
        const segment = segments[i];
        if (i === segmentIndex) {
          return { x: currentX, y: currentY };
        }

        if (segment.type === "M") {
          currentX = segment.x;
          currentY = segment.y;
          startX = currentX;
          startY = currentY;
        } else if (segment.type === "Z") {
          currentX = startX;
          currentY = startY;
        } else {
          currentX = segment.x;
          currentY = segment.y;
        }
      }

      return null;
    }

    function arcGeometryFromSegment(startX, startY, segment) {
      let rx = Math.abs(segment.rx || 0);
      let ry = Math.abs(segment.ry || 0);
      if (rx === 0 || ry === 0) return null;

      const rotation = segment.rotation || 0;
      const phi = rotation * Math.PI / 180;
      const cosPhi = Math.cos(phi);
      const sinPhi = Math.sin(phi);
      const dx2 = (startX - segment.x) / 2;
      const dy2 = (startY - segment.y) / 2;
      const x1p = cosPhi * dx2 + sinPhi * dy2;
      const y1p = -sinPhi * dx2 + cosPhi * dy2;

      let lambda = (x1p * x1p) / (rx * rx) + (y1p * y1p) / (ry * ry);
      if (lambda > 1) {
        const scale = Math.sqrt(lambda);
        rx *= scale;
        ry *= scale;
      }

      const rxSq = rx * rx;
      const rySq = ry * ry;
      const x1pSq = x1p * x1p;
      const y1pSq = y1p * y1p;
      const numerator = rxSq * rySq - rxSq * y1pSq - rySq * x1pSq;
      const denominator = rxSq * y1pSq + rySq * x1pSq;
      if (denominator === 0) return null;

      const sign = segment.largeArc === segment.sweep ? -1 : 1;
      const factor = sign * Math.sqrt(Math.max(0, numerator / denominator));
      const cxp = factor * ((rx * y1p) / ry);
      const cyp = factor * ((-ry * x1p) / rx);

      return {
        cx: cosPhi * cxp - sinPhi * cyp + (startX + segment.x) / 2,
        cy: sinPhi * cxp + cosPhi * cyp + (startY + segment.y) / 2,
        rx,
        ry,
        rotation
      };
    }

    function updateArcAxisHandle(segment, startPoint, localPoint, handleKind) {
      const geometry = arcGeometryFromSegment(startPoint.x, startPoint.y, segment);
      if (!geometry) return;

      const dx = localPoint.x - geometry.cx;
      const dy = localPoint.y - geometry.cy;
      const distance = Math.max(0.001, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      if (handleKind === "arc-rx") {
        segment.rx = snapValue(distance);
        segment.rotation = angle;
      } else if (handleKind === "arc-ry") {
        segment.ry = snapValue(distance);
        segment.rotation = angle - 90;
      }
    }

    function endpointCarrierAt(segments, segmentIndex) {
      for (let i = segmentIndex; i >= 0; i -= 1) {
        const segment = segments[i];
        if (segment && typeof segment.x === "number" && typeof segment.y === "number") {
          return { segment, index: i };
        }
      }
      return null;
    }

    function updateArcCenterHandle(segments, segmentIndex, localPoint) {
      const segment = segments[segmentIndex];
      if (!segment || segment.type !== "A") return;

      const startPoint = segmentStartPoint(segments, segmentIndex);
      if (!startPoint) return;

      const geometry = arcGeometryFromSegment(startPoint.x, startPoint.y, segment);
      if (!geometry) return;

      const dx = snapDelta(localPoint.x - geometry.cx);
      const dy = snapDelta(localPoint.y - geometry.cy);
      if (dx === 0 && dy === 0) return;

      const previousCarrier = endpointCarrierAt(segments, segmentIndex - 1);
      if (previousCarrier) {
        previousCarrier.segment.x = snapValue(previousCarrier.segment.x + dx);
        previousCarrier.segment.y = snapValue(previousCarrier.segment.y + dy);
      }

      segment.x = snapValue(segment.x + dx);
      segment.y = snapValue(segment.y + dy);
    }

    function cursorForHandle(name) {
      const cursors = {
        n: "ns-resize",
        s: "ns-resize",
        e: "ew-resize",
        w: "ew-resize",
        nw: "nwse-resize",
        se: "nwse-resize",
        ne: "nesw-resize",
        sw: "nesw-resize"
      };
      return cursors[name] || "default";
    }

    function updateSelectionUI() {
      updateOverlay();
      updatePathLegend();
      updateSelectedInfo();
      updateTextControls();
    }

    function updatePathLegend() {
      if (!pathLegend) return;
      const isVisible = Boolean(pathHandlesVisible && selectedSingleEditablePath());
      pathLegend.classList.toggle("is-visible", isVisible);
      pathLegend.setAttribute("aria-hidden", String(!isVisible));
    }

    function updateSelectedInfo() {
      if (selectedElements.size === 0) {
        selectedInfo.innerHTML = "No element selected.";
        return;
      }

      const items = Array.from(selectedElements).slice(0, 12).map(el => {
        const tag = el.tagName;
        const id = el.getAttribute("id") || "—";
        const className = cleanedClassName(el) || "—";
        const transform = el.getAttribute("transform") || "—";
        return `<li>&lt;${escapeHtml(tag)}&gt; id=${escapeHtml(id)} class=${escapeHtml(className)}<br><code>${escapeHtml(transform)}</code></li>`;
      }).join("");

      const extra = selectedElements.size > 12 ? `<div>Showing 12 of ${selectedElements.size} objects.</div>` : "";
      selectedInfo.innerHTML = `
        <div><strong>${selectedElements.size}</strong> object(s) selected.</div>
        <ul class="tiny-list">${items}</ul>
        ${extra}
      `;
    }

    function cleanedClassName(el) {
      return Array.from(el.classList || []).join(" ");
    }

    function cleanCloneForExport(clone) {
      clone.querySelectorAll('[data-nudger-overlay="true"]').forEach(el => el.remove());
      clone.querySelectorAll('[data-nudger-selected-ui="true"]').forEach(el => {
        el.removeAttribute("data-nudger-selected-ui");
      });
      return clone;
    }

    function cloneCleanSvg() {
      if (!svg) return null;
      return cleanCloneForExport(svg.cloneNode(true));
    }

    function serializeSvg(targetElement = null) {
      if (!svg) return { source: "", locator: null };

      const clone = svg.cloneNode(true);
      let targetClone = null;
      let token = null;

      if (targetElement) {
        const path = pathToElement(targetElement);
        targetClone = elementFromPath(clone, path);
      }

      cleanCloneForExport(clone);

      if (targetClone && clone.contains(targetClone)) {
        token = `nudger-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        targetClone.setAttribute("data-nudger-locator", token);
      }

      const serializer = new XMLSerializer();
      let source = serializer.serializeToString(clone);

      if (!/xmlns=/.test(source)) {
        source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
      }
      source = source.replace(/\s+xmlns="http:\/\/www\.w3\.org\/2000\/svg"\s+xmlns="http:\/\/www\.w3\.org\/2000\/svg"/, ' xmlns="http://www.w3.org/2000/svg"');
      source = prettySvg(source);

      let locator = null;
      if (token) {
        const attrPattern = new RegExp(`\\sdata-nudger-locator="${escapeRegExp(token)}"`);
        const attrMatch = source.match(attrPattern);
        if (attrMatch) {
          const attrStart = source.indexOf(attrMatch[0]);
          const tagStart = source.lastIndexOf("<", attrStart);
          const tagEndBeforeClean = source.indexOf(">", attrStart) + 1;
          source = source.replace(attrPattern, "");
          locator = {
            start: tagStart,
            end: Math.max(tagStart + 1, tagEndBeforeClean - attrMatch[0].length)
          };
        }
      }

      return { source, locator };
    }

    function prettySvg(source) {
      return source.replace(/></g, ">\n<");
    }

    function parsePathData(source) {
      const input = String(source || "").trim();
      if (!input) return null;

      const tokens = input.match(/[AaCcHhLlMmQqSsTtVvZz]|[-+]?(?:\d*\.\d+|\d+)(?:[eE][-+]?\d+)?/g);
      if (!tokens) return null;

      const segments = [];
      let index = 0;
      let command = null;
      let currentX = 0;
      let currentY = 0;
      let subpathStartX = 0;
      let subpathStartY = 0;
      let previousSegment = null;

      const isCommand = token => /^[A-Za-z]$/.test(token);
      const nextNumber = () => {
        if (index >= tokens.length || isCommand(tokens[index])) return null;
        return Number.parseFloat(tokens[index++]);
      };
      const hasNumbers = () => index < tokens.length && !isCommand(tokens[index]);

      while (index < tokens.length) {
        if (isCommand(tokens[index])) {
          command = tokens[index++];
        } else if (!command) {
          return null;
        }

        const lower = command.toLowerCase();
        const relative = command !== command.toUpperCase();

        if (lower === "m") {
          const x = nextNumber();
          const y = nextNumber();
          if (x === null || y === null) return null;

          currentX = relative ? currentX + x : x;
          currentY = relative ? currentY + y : y;
          subpathStartX = currentX;
          subpathStartY = currentY;
          segments.push({ type: "M", x: currentX, y: currentY });
          previousSegment = segments[segments.length - 1];

          while (hasNumbers()) {
            const lineX = nextNumber();
            const lineY = nextNumber();
            if (lineX === null || lineY === null) return null;
            currentX = relative ? currentX + lineX : lineX;
            currentY = relative ? currentY + lineY : lineY;
            segments.push({ type: "L", x: currentX, y: currentY });
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "z") {
          segments.push({ type: "Z" });
          currentX = subpathStartX;
          currentY = subpathStartY;
          previousSegment = segments[segments.length - 1];
          continue;
        }

        if (lower === "l") {
          while (hasNumbers()) {
            const x = nextNumber();
            const y = nextNumber();
            if (x === null || y === null) return null;
            currentX = relative ? currentX + x : x;
            currentY = relative ? currentY + y : y;
            segments.push({ type: "L", x: currentX, y: currentY });
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "h") {
          while (hasNumbers()) {
            const x = nextNumber();
            if (x === null) return null;
            currentX = relative ? currentX + x : x;
            segments.push({ type: "L", x: currentX, y: currentY });
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "v") {
          while (hasNumbers()) {
            const y = nextNumber();
            if (y === null) return null;
            currentY = relative ? currentY + y : y;
            segments.push({ type: "L", x: currentX, y: currentY });
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "c") {
          while (hasNumbers()) {
            const x1 = nextNumber();
            const y1 = nextNumber();
            const x2 = nextNumber();
            const y2 = nextNumber();
            const x = nextNumber();
            const y = nextNumber();
            if ([x1, y1, x2, y2, x, y].some(value => value === null)) return null;
            segments.push({
              type: "C",
              x1: relative ? currentX + x1 : x1,
              y1: relative ? currentY + y1 : y1,
              x2: relative ? currentX + x2 : x2,
              y2: relative ? currentY + y2 : y2,
              x: relative ? currentX + x : x,
              y: relative ? currentY + y : y
            });
            currentX = segments[segments.length - 1].x;
            currentY = segments[segments.length - 1].y;
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "s") {
          while (hasNumbers()) {
            const x2 = nextNumber();
            const y2 = nextNumber();
            const x = nextNumber();
            const y = nextNumber();
            if ([x2, y2, x, y].some(value => value === null)) return null;

            const reflected = previousSegment && previousSegment.type === "C"
              ? { x: currentX * 2 - previousSegment.x2, y: currentY * 2 - previousSegment.y2 }
              : { x: currentX, y: currentY };

            segments.push({
              type: "C",
              x1: reflected.x,
              y1: reflected.y,
              x2: relative ? currentX + x2 : x2,
              y2: relative ? currentY + y2 : y2,
              x: relative ? currentX + x : x,
              y: relative ? currentY + y : y
            });
            currentX = segments[segments.length - 1].x;
            currentY = segments[segments.length - 1].y;
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "q") {
          while (hasNumbers()) {
            const x1 = nextNumber();
            const y1 = nextNumber();
            const x = nextNumber();
            const y = nextNumber();
            if ([x1, y1, x, y].some(value => value === null)) return null;
            segments.push({
              type: "Q",
              x1: relative ? currentX + x1 : x1,
              y1: relative ? currentY + y1 : y1,
              x: relative ? currentX + x : x,
              y: relative ? currentY + y : y
            });
            currentX = segments[segments.length - 1].x;
            currentY = segments[segments.length - 1].y;
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "t") {
          while (hasNumbers()) {
            const x = nextNumber();
            const y = nextNumber();
            if ([x, y].some(value => value === null)) return null;

            const reflected = previousSegment && previousSegment.type === "Q"
              ? { x: currentX * 2 - previousSegment.x1, y: currentY * 2 - previousSegment.y1 }
              : { x: currentX, y: currentY };

            segments.push({
              type: "Q",
              x1: reflected.x,
              y1: reflected.y,
              x: relative ? currentX + x : x,
              y: relative ? currentY + y : y
            });
            currentX = segments[segments.length - 1].x;
            currentY = segments[segments.length - 1].y;
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        if (lower === "a") {
          while (hasNumbers()) {
            const rx = nextNumber();
            const ry = nextNumber();
            const rotation = nextNumber();
            const largeArc = nextNumber();
            const sweep = nextNumber();
            const x = nextNumber();
            const y = nextNumber();
            if ([rx, ry, rotation, largeArc, sweep, x, y].some(value => value === null)) return null;

            segments.push({
              type: "A",
              rx: Math.abs(rx),
              ry: Math.abs(ry),
              rotation,
              largeArc: largeArc ? 1 : 0,
              sweep: sweep ? 1 : 0,
              x: relative ? currentX + x : x,
              y: relative ? currentY + y : y
            });
            currentX = segments[segments.length - 1].x;
            currentY = segments[segments.length - 1].y;
            previousSegment = segments[segments.length - 1];
          }
          continue;
        }

        return null;
      }

      return segments;
    }

    function formatPathNumber(value) {
      const rounded = Math.round(value * 1000) / 1000;
      if (Object.is(rounded, -0)) return "0";
      return String(rounded);
    }

    function serializePathData(segments) {
      return segments.map(segment => {
        if (segment.type === "M" || segment.type === "L") {
          return `${segment.type} ${formatPathNumber(segment.x)} ${formatPathNumber(segment.y)}`;
        }
        if (segment.type === "C") {
          return `C ${formatPathNumber(segment.x1)} ${formatPathNumber(segment.y1)} ${formatPathNumber(segment.x2)} ${formatPathNumber(segment.y2)} ${formatPathNumber(segment.x)} ${formatPathNumber(segment.y)}`;
        }
        if (segment.type === "Q") {
          return `Q ${formatPathNumber(segment.x1)} ${formatPathNumber(segment.y1)} ${formatPathNumber(segment.x)} ${formatPathNumber(segment.y)}`;
        }
        if (segment.type === "A") {
          return `A ${formatPathNumber(segment.rx)} ${formatPathNumber(segment.ry)} ${formatPathNumber(segment.rotation || 0)} ${segment.largeArc ? 1 : 0} ${segment.sweep ? 1 : 0} ${formatPathNumber(segment.x)} ${formatPathNumber(segment.y)}`;
        }
        return "Z";
      }).join(" ");
    }

    function pathToElement(element) {
      const path = [];
      let node = element;
      while (node && node !== svg) {
        const parent = node.parentNode;
        if (!parent) return [];
        path.unshift(Array.from(parent.children).indexOf(node));
        node = parent;
      }
      return path;
    }

    function elementFromPath(root, path) {
      let node = root;
      for (const index of path) {
        if (!node || index < 0) return null;
        node = Array.from(node.children)[index];
      }
      return node;
    }

    function updateSvgCode(options = {}) {
      if (!svg) {
        if (options.force || document.activeElement !== svgCode) {
          svgCode.value = "";
        }
        codeEditorDirty = false;
        return;
      }

      if (document.activeElement === svgCode && !options.force && !options.locateSelection) {
        return;
      }

      const target = options.locateSelection && selectedElements.size === 1
        ? Array.from(selectedElements)[0]
        : null;
      const result = serializeSvg(target);
      svgCode.value = result.source;
      codeEditorDirty = false;

      if (result.locator) {
        locateInSvgCode(result.locator.start, result.locator.end);
      }
    }

    function locateInSvgCode(start, end) {
      if (codePanelHidden) {
        svgCode.setSelectionRange(start, end);
        return;
      }

      window.requestAnimationFrame(() => {
        svgCode.focus({ preventScroll: true });
        svgCode.setSelectionRange(start, end);
        const before = svgCode.value.slice(0, start);
        const lineCount = before.split("\n").length - 1;
        const lineHeight = textareaLineHeight(svgCode);

        window.requestAnimationFrame(() => {
          svgCode.scrollTop = Math.max(0, (lineCount - 3) * lineHeight);
          svgCode.scrollLeft = 0;
        });
      });
    }

    function textareaLineHeight(el) {
      const computed = window.getComputedStyle(el);
      const parsed = Number.parseFloat(computed.lineHeight);
      if (Number.isFinite(parsed)) return parsed;

      const fontSize = Number.parseFloat(computed.fontSize);
      return Number.isFinite(fontSize) ? fontSize * 1.2 : 16;
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }
    function selectedTextElements() {
      return Array.from(selectedElements).filter(isTextElement);
    }

    function isTextElement(el) {
      const tag = (el.tagName || "").toLowerCase();
      return tag === "text" || tag === "tspan";
    }

    function updateTextControls() {
      if (!textControls) return;
      const textEls = selectedTextElements();

      if (textEls.length === 0 || textEls.length !== selectedElements.size || textPanelDismissed) {
        textControls.classList.remove("is-visible");
        textControls.classList.add("hidden");
        return;
      }

      textControls.classList.remove("hidden");
      textControls.classList.add("is-visible");
      fontFamilyInput.value = commonAttributeValue(textEls, "font-family");
      fontSizeInput.value = commonAttributeValue(textEls, "font-size");
    }

    function commonAttributeValue(elements, attr) {
      if (elements.length === 0) return "";
      const values = elements.map(el => el.getAttribute(attr) || "");
      const first = values[0];
      return values.every(value => value === first) ? first : "";
    }

    function normalizeFontSize(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      return /^[-+]?[0-9]*\.?[0-9]+$/.test(trimmed) ? `${trimmed}px` : trimmed;
    }

    function applyTextStyle() {
      const textEls = selectedTextElements();
      if (textEls.length === 0) {
        setStatus("Select one or more <text> or <tspan> elements first.");
        return;
      }

      const family = fontFamilyInput.value.trim();
      const size = normalizeFontSize(fontSizeInput.value);
      const changes = [];

      textEls.forEach(element => {
        if (family) {
          changes.push({
            element,
            attr: "font-family",
            before: element.getAttribute("font-family") || "",
            after: family
          });
          element.setAttribute("font-family", family);
        }

        if (size) {
          changes.push({
            element,
            attr: "font-size",
            before: element.getAttribute("font-size") || "",
            after: size
          });
          element.setAttribute("font-size", size);
        }
      });

      const realChanges = changes.filter(item => item.before !== item.after);
      if (realChanges.length > 0) {
        undoStack.push({ items: realChanges });
        redoStack.length = 0;
        updateHistoryButtons();
        updateSelectionUI();
        updateSvgCode({ locateSelection: selectedElements.size === 1 });
        setStatus(`Updated text style on ${textEls.length} text element(s).`);
      } else {
        setStatus("No text style changes to apply.");
      }
    }

    applyTextBtn.addEventListener("click", applyTextStyle);

    svgCode.addEventListener("input", () => {
      codeEditorDirty = true;
    });

    svgCode.addEventListener("change", () => {
      applySvgCodeEditor();
    });

    svgCode.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "enter") {
        applySvgCodeEditor();
        event.preventDefault();
      }
    });

    function applySvgCodeEditor() {
      if (!svgCode) return false;

      if (!codeEditorDirty && svg) {
        return true;
      }

      const parsed = parseSvgMarkup(svgCode.value);
      if (!parsed.ok) {
        setStatus(parsed.error);
        return false;
      }

      mountSvg(parsed.svg);
      setStatus("Edited SVG code applied.");
      return true;
    }

    function setInteractionMode(mode, options = {}) {
      interactionMode = mode === "code" ? "code" : "canvas";
      const isCodeMode = interactionMode === "code";
      codeModeToggle.textContent = isCodeMode ? "Code edit mode" : "Canvas mode";
      codeModeToggle.classList.toggle("is-code", isCodeMode);
      codeModeToggle.classList.toggle("is-canvas", !isCodeMode);
      codeModeToggle.setAttribute("aria-pressed", String(isCodeMode));
      codeModeToggle.title = isCodeMode
        ? "Code edit mode. Click to switch to canvas mode."
        : "Canvas mode. Click to switch to code edit mode.";

      if (!options.syncFocus) return;

      if (isCodeMode) {
        if (codePanelHidden) return;
        svgCode.focus({ preventScroll: true });
      } else if (document.activeElement === svgCode) {
        svgCode.blur();
      }
    }

    codeModeToggle.addEventListener("click", () => {
      setInteractionMode(interactionMode === "code" ? "canvas" : "code", { syncFocus: true });
    });

    copyBtn.addEventListener("click", async () => {
      if (!svg) return;
      if (!applySvgCodeEditor()) return;
      updateSvgCode({ force: true });

      try {
        await navigator.clipboard.writeText(svgCode.value);
        setStatus("SVG code copied to clipboard.");
      } catch (error) {
        svgCode.focus();
        svgCode.select();
        document.execCommand("copy");
        setStatus("SVG code copied using fallback copy.");
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!svg) return;
      if (!applySvgCodeEditor()) return;
      updateSvgCode({ force: true });
      const blob = new Blob([svgCode.value], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("Edited SVG downloaded.");
    });

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
